services:
  - type: web
    name: campus-companion
    runtime: python
    plan: free
    buildCommand: ""
    startCommand: python3 server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: STORAGE_DIR
        value: /var/data
    disk:
      name: campus-companion-data
      mountPath: /var/data
      sizeGB: 1
